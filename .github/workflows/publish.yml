# Auto-publish Reel to PyPI when you push a version tag (e.g. v1.0.1).
# One-time setup required — see PUBLISHING.md §3 (add a PyPI "Trusted Publisher"
# for this repo). No API tokens are stored anywhere: PyPI trusts this workflow
# directly via OpenID Connect.
name: publish

on:
  push:
    tags:
      - "v*"          # any tag like v1.0.0, v1.2.3

jobs:
  pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build the package
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
