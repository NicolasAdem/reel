# ─────────────────────────────────────────────────────────────────────────
#  reel config — optional. Without this file, reel uses these same defaults.
#  (Windows paths use / not \.)
# ─────────────────────────────────────────────────────────────────────────

# [library]
# By default the library is a 'reel' folder in your Documents, and reel FOLLOWS
# it if you move it (it searches and updates itself). Leave sync_root commented
# out to keep that. Only uncomment to PIN a fixed path — pinning turns off the
# auto-follow, so reel will always use exactly this path.
# sync_root = "D:/MyBackups/reel"

[device]
# How the ICD-UX570 mounts. Detection also works structurally (any drive with
# a REC_FILE folder), so you rarely need to touch this.
labels = ["IC RECORDER", "MEMORY CARD", "IC RECORDER MEMORY CARD"]
delete_after_sync = false      # safe: copy off the recorder, never wipe it

[watch]
interval_sec = 4               # how often auto-copy looks for a drive
close_on_unplug = true         # close the pop-up window when you unplug

[ui]
theme = "light"                # "light" (default) or "dark"
